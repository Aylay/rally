AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Rally backend — heartbeat (Modèle B, time-anchor).
  Loop DÉRIVÉE (modulo) côté client : rebouclage instantané, zéro trou.
  La Lambda ne roll plus — elle garantit juste l'anchor de base (gardien + couture V2).

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]     # ~20% moins cher, et le SDK AWS v3 est fourni par le runtime
    Timeout: 10
    MemorySize: 128

Resources:
  # L'anchor : un seul petit item. La séquence courante n'est JAMAIS stockée, elle se dérive du temps.
  RallyStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RallyState
      BillingMode: PAY_PER_REQUEST     # on-demand : zéro capacity planning, idéal pour une charge minuscule
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  # Le gardien : garantit que l'anchor de base existe (self-heal). Ne pilote plus l'horloge.
  RollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rally-roll
      CodeUri: roll/
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref RallyStateTable
          MATCH_PK: "match#fra_aus_2019"
          LAST_SEQUENCE: "73"     # défauts utilisés UNIQUEMENT à l'amorçage (ensuite l'item fait foi)
          TICK_MS: "1500"
          PAUSE_MS: "15000"
      Policies:
        - DynamoDBCrudPolicy:           # SAM génère la policy IAM minimale sur CETTE table
            TableName: !Ref RallyStateTable
      Events:
        Guardian:
          Type: Schedule               # = règle EventBridge (couture V2 + self-heal)
          Properties:
            Schedule: rate(1 hour)     # plus l'horloge : un simple filet de sécurité
            Name: rally-guardian
            Description: Garantit l'anchor de base ; reprendra la transition de match en V2.

  # Endpoint public GET : publie l'anchor (+ serverNow pour le calage). Lecture seule.
  StateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rally-state
      CodeUri: state/
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref RallyStateTable
          MATCH_PK: "match#fra_aus_2019"
      Policies:
        - DynamoDBReadPolicy:          # least-priv : cette Lambda ne fait que LIRE
            TableName: !Ref RallyStateTable
      FunctionUrlConfig:
        AuthType: NONE                 # endpoint public (donnée non sensible, lecture seule)
        Cors:
          AllowOrigins:
            - "https://rally.lucas-attali.me"
            - "http://localhost:3000"  # ajoute d'autres origines si besoin
          AllowMethods: ["GET"]

Outputs:
  TableName:
    Value: !Ref RallyStateTable
  FunctionName:
    Value: !Ref RollFunction
  StateUrl:
    Description: URL publique de l'anchor (à brancher dans le front)
    Value: !GetAtt StateFunctionUrl.FunctionUrl