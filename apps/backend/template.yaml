AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Rally backend — heartbeat (Modèle B, time-anchor).
  Loop DÉRIVÉE (modulo) côté client : rebouclage instantané, zéro trou.
  La Lambda ne roll plus — elle garantit juste l'anchor de base (gardien + couture V2).

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]     # ~20% moins cher, et le SDK AWS v3 est fourni par le runtime
    Timeout: 10
    MemorySize: 128

Resources:
  # L'anchor : un seul petit item. La séquence courante n'est JAMAIS stockée, elle se dérive du temps.
  RallyStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RallyState
      BillingMode: PAY_PER_REQUEST     # on-demand : zéro capacity planning, idéal pour une charge minuscule
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

  # Le gardien : garantit que l'anchor de base existe (self-heal). Ne pilote plus l'horloge.
  RollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rally-roll
      CodeUri: roll/
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref RallyStateTable
          MATCH_PK: "match#fra_aus_2019"
          LAST_SEQUENCE: "73"     # défauts utilisés UNIQUEMENT à l'amorçage (ensuite l'item fait foi)
          TICK_MS: "1500"
          PAUSE_MS: "15000"
      Policies:
        - DynamoDBCrudPolicy:           # SAM génère la policy IAM minimale sur CETTE table
            TableName: !Ref RallyStateTable
      Events:
        Guardian:
          Type: Schedule               # = règle EventBridge (couture V2 + self-heal)
          Properties:
            Schedule: rate(1 hour)     # plus l'horloge : un simple filet de sécurité
            Name: rally-guardian
            Description: Garantit l'anchor de base ; reprendra la transition de match en V2.

  # Endpoint public GET : publie l'anchor (+ serverNow pour le calage). Lecture seule.
  StateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rally-state
      CodeUri: state/
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref RallyStateTable
          MATCH_PK: "match#fra_aus_2019"
      Policies:
        - DynamoDBReadPolicy:          # least-priv : cette Lambda ne fait que LIRE
            TableName: !Ref RallyStateTable
      FunctionUrlConfig:
        AuthType: NONE                 # endpoint public (donnée non sensible, lecture seule)
        Cors:
          AllowOrigins:
            - "https://rally.lucas-attali.me"
            - "http://localhost:3000"  # ajoute d'autres origines si besoin
          AllowMethods: ["GET"]

  # --- WebSocket (sous-tranche A) : présence live + unicité du pseudo ---

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RallyConnections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: connectionId, AttributeType: S }
      KeySchema:
        - { AttributeName: connectionId, KeyType: HASH }

  NamesTable:                        # existe uniquement pour la réservation atomique du pseudo
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RallyNames
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: name, AttributeType: S }
      KeySchema:
        - { AttributeName: name, KeyType: HASH }

  WsFunction:                        # UNE Lambda pour toutes les routes ($connect / join / $disconnect)
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rally-ws
      CodeUri: ws/
      Handler: index.handler
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          NAMES_TABLE: !Ref NamesTable
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ConnectionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NamesTable }
        - Statement:                 # droit de POUSSER aux clients connectés (broadcast)
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/POST/@connections/*"

  # SAM n'a pas de sucre WebSocket → on écrit l'API ApiGatewayV2 à la main.
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: rally-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"   # le client envoie {"action":"join", ...}

  WsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsFunction.Arn}/invocations"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref WebSocketApi, RouteKey: "$connect", Target: !Sub "integrations/${WsIntegration}" }
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref WebSocketApi, RouteKey: "$disconnect", Target: !Sub "integrations/${WsIntegration}" }
  JoinRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties: { ApiId: !Ref WebSocketApi, RouteKey: "join", Target: !Sub "integrations/${WsIntegration}" }

  WsStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties: { ApiId: !Ref WebSocketApi, StageName: prod, AutoDeploy: true }

  WsInvokePermission:                # autorise API Gateway à invoquer la Lambda
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*/*"

Outputs:
  TableName:
    Value: !Ref RallyStateTable
  FunctionName:
    Value: !Ref RollFunction
  StateUrl:
    Description: URL publique de l'anchor (à brancher dans le front)
    Value: !GetAtt StateFunctionUrl.FunctionUrl
  WebSocketUrl:
    Description: URL WSS (wscat + front)
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${WsStage}"